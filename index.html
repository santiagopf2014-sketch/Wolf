<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="color-scheme" content="light" />
  <title>Wolf. Catalog</title>
  <style>
    :root{
      --bg:#0b1020;
      --card:#111a33;
      --card2:#0f1730;
      --text:#f3f6ff;
      --muted:#b9c2ff;
      --line:rgba(255,255,255,.12);
      --brand:#8cffc1;
      --brand2:#7aa7ff;
      --danger:#ff6b6b;
      --shadow: 0 10px 30px rgba(0,0,0,.35);
      --radius: 18px;
      --radius2: 14px;
      --max: 1100px;
      --focus: 0 0 0 4px rgba(140,255,193,.25);
      font-synthesis-weight: none;
    }

    *{ box-sizing:border-box; }
    html,body{ height:100%; }
    body{
      margin:0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, "Noto Sans", "Apple Color Emoji","Segoe UI Emoji";
      background:
        radial-gradient(900px 600px at 20% -10%, rgba(122,167,255,.35), transparent 60%),
        radial-gradient(700px 500px at 95% 10%, rgba(140,255,193,.25), transparent 55%),
        radial-gradient(900px 700px at 40% 120%, rgba(255,255,255,.08), transparent 55%),
        var(--bg);
      color:var(--text);
    }

    a{ color:inherit; }
    img{ max-width:100%; display:block; }

    .wrap{ max-width: var(--max); margin:0 auto; padding: 18px; }

    header{
      position: sticky;
      top:0;
      z-index:10;
      backdrop-filter: blur(10px);
      background: rgba(11,16,32,.75);
      border-bottom:1px solid var(--line);
    }

    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      padding: 14px 18px;
      max-width: var(--max);
      margin:0 auto;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:10px;
      min-width: 180px;
    }

    .brand img{
      width:40px;
      height:40px;
      border-radius:12px;
      background: rgba(255,255,255,.12);
      border:1px solid var(--line);
      object-fit: cover;
    }

    .brand .title{
      display:flex;
      flex-direction:column;
      line-height:1.1;
    }
    .brand .title strong{ font-size: 16px; letter-spacing:.2px; }
    .brand .title span{ font-size: 12px; color: var(--muted); }

    .controls{
      display:flex;
      gap:10px;
      align-items:center;
      flex-wrap: wrap;
      justify-content:flex-end;
    }

    .pill{
      display:inline-flex;
      align-items:center;
      gap:8px;
      border:1px solid var(--line);
      background: rgba(255,255,255,.06);
      padding: 10px 12px;
      border-radius: 999px;
      box-shadow: none;
    }

    .btn{
      cursor:pointer;
      border:1px solid var(--line);
      background: rgba(255,255,255,.06);
      color: var(--text);
      padding: 12px 14px;
      border-radius: 14px;
      font-weight: 650;
      letter-spacing:.2px;
      transition: transform .05s ease, background .15s ease, border-color .15s ease;
      user-select:none;
    }
    .btn:hover{ background: rgba(255,255,255,.10); }
    .btn:active{ transform: translateY(1px); }
    .btn:focus{ outline:none; box-shadow: var(--focus); }

    .btnPrimary{
      background: linear-gradient(135deg, rgba(140,255,193,.20), rgba(122,167,255,.18));
      border-color: rgba(140,255,193,.35);
    }

    .btnDanger{
      border-color: rgba(255,107,107,.35);
      background: rgba(255,107,107,.12);
    }

    .cartBadge{
      display:inline-flex;
      align-items:center;
      gap:10px;
    }
    .badge{
      min-width: 26px;
      height: 26px;
      padding: 0 8px;
      border-radius: 999px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      background: rgba(140,255,193,.20);
      border: 1px solid rgba(140,255,193,.35);
      font-weight: 800;
    }

    .hero{
      padding: 18px 0 6px 0;
    }
    .heroCard{
      border:1px solid var(--line);
      border-radius: var(--radius);
      background: linear-gradient(180deg, rgba(255,255,255,.07), rgba(255,255,255,.03));
      box-shadow: var(--shadow);
      padding: 16px;
      display:flex;
      gap:14px;
      align-items:flex-start;
    }
    .heroCard .emoji{
      width:46px;
      height:46px;
      border-radius: 16px;
      background: rgba(140,255,193,.18);
      border:1px solid rgba(140,255,193,.35);
      display:flex;
      align-items:center;
      justify-content:center;
      font-size: 24px;
      flex: 0 0 auto;
    }
    .heroCard h1{
      margin:0;
      font-size: 20px;
      letter-spacing:.2px;
    }
    .heroCard p{
      margin:6px 0 0 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.35;
    }

    .grid{
      display:grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      padding: 14px 0 20px 0;
    }

    @media (min-width: 680px){
      .grid{ grid-template-columns: repeat(3, minmax(0, 1fr)); }
      .heroCard{ padding: 18px; }
      .heroCard h1{ font-size: 24px; }
    }
    @media (min-width: 980px){
      .grid{ grid-template-columns: repeat(4, minmax(0, 1fr)); }
    }

    .card{
      border:1px solid var(--line);
      background: rgba(255,255,255,.05);
      border-radius: var(--radius);
      overflow:hidden;
      box-shadow: none;
      cursor:pointer;
      transition: transform .08s ease, background .15s ease, border-color .15s ease;
      display:flex;
      flex-direction:column;
      min-height: 220px;
    }
    .card:hover{
      transform: translateY(-1px);
      background: rgba(255,255,255,.07);
      border-color: rgba(255,255,255,.18);
    }
    .thumb{
      aspect-ratio: 4 / 3;
      background: rgba(255,255,255,.06);
      border-bottom:1px solid var(--line);
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:hidden;
    }
    .thumb img{
      width:100%;
      height:100%;
      object-fit: cover;
    }
    .cardBody{
      padding: 12px 12px 14px 12px;
      display:flex;
      flex-direction:column;
      gap: 6px;
      flex: 1 1 auto;
    }
    .cardTitle{
      font-weight: 850;
      letter-spacing:.2px;
      font-size: 14px;
      line-height: 1.2;
    }
    .cardMeta{
      font-size: 12px;
      color: var(--muted);
      display:flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items:center;
    }
    .tag{
      font-size: 11px;
      padding: 5px 8px;
      border-radius: 999px;
      border:1px solid rgba(255,255,255,.14);
      background: rgba(255,255,255,.06);
    }

    .view{
      padding: 14px 0 30px 0;
    }

    .panel{
      border:1px solid var(--line);
      background: rgba(255,255,255,.05);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow:hidden;
    }

    .panelHeader{
      padding: 14px 14px 12px 14px;
      border-bottom:1px solid var(--line);
      display:flex;
      gap:10px;
      align-items:center;
      justify-content:space-between;
      flex-wrap: wrap;
    }

    .crumbs{
      display:flex;
      gap:10px;
      align-items:center;
      flex-wrap: wrap;
    }
    .crumbs .small{
      font-size: 12px;
      color: var(--muted);
    }

    .panelBody{
      padding: 14px;
      display:grid;
      gap: 14px;
    }
    @media (min-width: 860px){
      .panelBody{
        grid-template-columns: 1.2fr .8fr;
        align-items:start;
      }
    }

    .bigImg{
      border-radius: var(--radius);
      overflow:hidden;
      border:1px solid var(--line);
      background: rgba(255,255,255,.04);
      aspect-ratio: 4/3;
    }
    .bigImg img{
      width:100%;
      height:100%;
      object-fit: cover;
    }

    .info h2{ margin:0; font-size: 20px; letter-spacing:.2px; }
    .info p{
      margin: 8px 0 0 0;
      color: var(--muted);
      line-height: 1.4;
      font-size: 14px;
    }

    .form{
      margin-top: 12px;
      display:grid;
      gap: 10px;
    }

    label{
      font-size: 12px;
      color: var(--muted);
      display:block;
      margin-bottom: 6px;
    }

    select,input,textarea{
      width:100%;
      border-radius: 14px;
      border:1px solid var(--line);
      background: rgba(255,255,255,.06);
      color: var(--text);
      padding: 12px 12px;
      font-size: 14px;
    }
    textarea{ min-height: 84px; resize: vertical; }
    select:focus,input:focus,textarea:focus{ outline:none; box-shadow: var(--focus); }

    .row2{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .priceLine{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap: 12px;
      padding: 10px 12px;
      border:1px dashed rgba(255,255,255,.16);
      border-radius: 14px;
      background: rgba(255,255,255,.03);
      margin-top: 10px;
    }
    .priceLine strong{ font-size: 14px; }
    .priceLine span{ color: var(--muted); font-size: 13px; }

    .divider{
      height:1px;
      background: var(--line);
      margin: 10px 0;
    }

    .cartList{
      display:grid;
      gap: 10px;
    }
    .cartItem{
      border:1px solid var(--line);
      border-radius: var(--radius2);
      background: rgba(255,255,255,.04);
      padding: 12px;
      display:grid;
      gap: 10px;
    }
    @media (min-width: 760px){
      .cartItem{
        grid-template-columns: 1.5fr .7fr .7fr .7fr auto;
        align-items:center;
      }
    }
    .cartItem .name{
      font-weight: 800;
      line-height:1.2;
    }
    .cartItem .sub{
      font-size: 12px;
      color: var(--muted);
      margin-top: 4px;
    }
    .right{ text-align:right; }
    .muted{ color: var(--muted); }

    .notice{
      border:1px solid rgba(122,167,255,.28);
      background: rgba(122,167,255,.10);
      border-radius: var(--radius);
      padding: 12px;
      color: var(--text);
      font-size: 13px;
      line-height: 1.35;
    }

    .srOnly{
      position:absolute;
      width:1px;height:1px;
      padding:0;margin:-1px;
      overflow:hidden;clip:rect(0,0,0,0);
      white-space:nowrap;border:0;
    }
  </style>
</head>

<body>
  <header>
    <div class="topbar">
      <div class="brand" role="banner">
        <img id="logo" src="assets/logo.png" alt="Wolf logo" onerror="this.style.display='none'">
        <div class="title">
          <strong>Wolf</strong>
          <span id="subtitle">Catalog</span>
        </div>
      </div>

      <div class="controls" role="navigation" aria-label="Top controls">
        <div class="pill" aria-label="Language">
          <button class="btn" id="langBtn" type="button" aria-label="Toggle language">FR</button>
        </div>

        <button class="btn btnPrimary" id="cartBtn" type="button">
          <span class="cartBadge">
            <span id="cartLabel">Cart</span>
            <span class="badge" id="cartCount">0</span>
          </span>
        </button>
      </div>
    </div>
  </header>

  <main class="wrap" id="app" aria-live="polite"></main>

  <script>
    // ---------------------------
    // Editable options/prices
    // ---------------------------
    let CONFIG = null;

async function loadConfig(){
  const res = await fetch("data/config.json", { cache: "no-store" });
  if(!res.ok) throw new Error("config fetch failed");
  CONFIG = await res.json();
}

    // ---------------------------
    // State + helpers
    // ---------------------------
    const LS_KEY = "wolf_app_v1";
    const state = loadState();

    function loadState(){
      try{
        const raw = localStorage.getItem(LS_KEY);
        const parsed = raw ? JSON.parse(raw) : null;
        return {
          lang: parsed?.lang === "fr" ? "fr" : "en",
          cart: Array.isArray(parsed?.cart) ? parsed.cart : [],
          route: { view: "home", id: null }
        };
      }catch(e){
        return { lang:"en", cart:[], route:{view:"home",id:null} };
      }
    }
    function saveState(){
      localStorage.setItem(LS_KEY, JSON.stringify({ lang: state.lang, cart: state.cart }));
    }

    function money(n){
      const fixed = (Math.round((Number(n) + Number.EPSILON) * 100) / 100).toFixed(2);
      return `${fixed} ${CONFIG.currency}`;
    }

    function t(obj){ return state.lang === "fr" ? obj.fr : obj.en; }

    const STR = {
      en: {
        subtitle: "Bilingual catalog",
        introTitle: "Choose an image and send an order request",
        introText: "No payment online. Add items to your cart, then send the order by email.",
        browse: "Browse",
        back: "Back",
        cart: "Cart",
        empty: "Your cart is empty.",
        itemDetails: "Item details",
        productType: "Product type",
        size: "Size",
        qty: "Quantity",
        addToCart: "Add to cart",
        inCart: "In cart",
        remove: "Remove",
        unit: "Unit",
        total: "Total",
        subtotal: "Subtotal",
        checkout: "Checkout by email",
        name: "Name",
        phone: "Phone number",
        comments: "Comments (optional)",
        sendEmail: "Open email to send order",
        required: "Required",
        catalogError: "Could not load the catalog. Check that data/catalog.csv exists.",
        tagLabel: "Tags",
        a11yGrid: "Catalog items",
        a11yItem: "Open item",
        noteMailto: "Note: this opens your email app. If it does not open, copy the order summary and email it manually."
      },
      fr: {
        subtitle: "Catalogue bilingue",
        introTitle: "Choisis une image et envoie une demande de commande",
        introText: "Aucun paiement en ligne. Ajoute au panier, puis envoie la commande par courriel.",
        browse: "Catalogue",
        back: "Retour",
        cart: "Panier",
        empty: "Ton panier est vide.",
        itemDetails: "Détails",
        productType: "Type de produit",
        size: "Taille",
        qty: "Quantité",
        addToCart: "Ajouter au panier",
        inCart: "Dans le panier",
        remove: "Retirer",
        unit: "Unité",
        total: "Total",
        subtotal: "Sous total",
        checkout: "Commander par courriel",
        name: "Nom",
        phone: "Téléphone",
        comments: "Commentaires (optionnel)",
        sendEmail: "Ouvrir le courriel pour envoyer la commande",
        required: "Requis",
        catalogError: "Impossible de charger le catalogue. Vérifie que data/catalog.csv existe.",
        tagLabel: "Mots clés",
        a11yGrid: "Articles du catalogue",
        a11yItem: "Ouvrir l’article",
        noteMailto: "Note: ça ouvre ton application courriel. Si ça ne s’ouvre pas, copie le résumé et envoie-le manuellement."
      }
    };

    function s(key){ return STR[state.lang][key]; }

    function setLang(next){
      state.lang = next === "fr" ? "fr" : "en";
      saveState();
      syncTopBar();
      render();
    }

    function cartCount(){
      return state.cart.reduce((sum, it) => sum + Number(it.qty || 0), 0);
    }

    function cartSubtotal(){
      return state.cart.reduce((sum, it) => sum + (Number(it.unitPrice) * Number(it.qty)), 0);
    }

   function findSize(key){
     return CONFIG.sizes.find(x => x.key === key) || CONFIG.sizes[0];
   }
   function findType(key){
     return CONFIG.productTypes.find(x => x.key === key) || CONFIG.productTypes[0];
   }
   function getUnitPrice(productTypeKey, sizeKey){
     const type = findType(productTypeKey);
     const p = type?.prices?.[sizeKey];
     return Number.isFinite(Number(p)) ? Number(p) : 0;
   }

    function addToCart(item, productTypeKey, sizeKey, qty){
      const q = Math.max(1, Math.min(99, Number(qty || 1)));
      const size = findSize(sizeKey);
      const type = findType(productTypeKey);

      const lineId = `${item.id}__${type.key}__${size.key}`;
      const existing = state.cart.find(x => x.lineId === lineId);

      if(existing){
        existing.qty = Math.max(1, Math.min(99, Number(existing.qty) + q));
      }else{
        state.cart.push({
          lineId,
          itemId: item.id,
          itemName_en: item.title_en,
          itemName_fr: item.title_fr,
          productType: type.key,
          size: size.key,
          unitPrice: getUnitPrice(type.key, size.key),
          qty: q
        });
      }

      saveState();
      syncTopBar();
    }

    function removeLine(lineId){
      state.cart = state.cart.filter(x => x.lineId !== lineId);
      saveState();
      syncTopBar();
      render();
    }

    function updateQty(lineId, nextQty){
      const q = Math.max(1, Math.min(99, Number(nextQty || 1)));
      const it = state.cart.find(x => x.lineId === lineId);
      if(!it) return;
      it.qty = q;
      saveState();
      syncTopBar();
      render();
    }

    function syncTopBar(){
      document.documentElement.lang = state.lang === "fr" ? "fr" : "en";
      document.getElementById("subtitle").textContent = s("subtitle");
      const langBtn = document.getElementById("langBtn");
      langBtn.textContent = state.lang === "fr" ? "EN" : "FR";
      document.getElementById("cartLabel").textContent = s("cart");
      document.getElementById("cartCount").textContent = String(cartCount());
    }

    // ---------------------------
    // Routing
    // ---------------------------
    function parseHash(){
      const h = location.hash.replace("#","").trim();
      if(!h) return { view:"home", id:null };
      const [view, id] = h.split("/");
      if(view === "item" && id) return { view:"item", id };
      if(view === "cart") return { view:"cart", id:null };
      return { view:"home", id:null };
    }
    function go(hash){
      location.hash = hash;
    }

    // ---------------------------
    // CSV loader
    // ---------------------------
    let catalog = [];
    let catalogById = {};

    async function loadCatalog(){
      // CSV in repo: data/catalog.csv
      const res = await fetch("data/catalog.csv", { cache: "no-store" });
      if(!res.ok) throw new Error("catalog fetch failed");
      const text = await res.text();
      const rows = parseCSV(text);
      catalog = rows.map(normalizeRow).filter(x => x.id && x.image_filename);
      catalogById = Object.fromEntries(catalog.map(x => [x.id, x]));
    }

    function normalizeRow(r){
      return {
        id: (r.id || "").trim(),
        title_en: (r.title_en || "").trim(),
        title_fr: (r.title_fr || "").trim(),
        description_en: (r.description_en || "").trim(),
        description_fr: (r.description_fr || "").trim(),
        image_filename: (r.image_filename || "").trim(),
        tags: (r.tags || "").trim()
      };
    }

    // Minimal CSV parser (handles quoted values)
    function parseCSV(csvText){
      const text = csvText.replace(/\r\n/g, "\n").replace(/\r/g, "\n");
      const lines = text.split("\n").filter(line => line.trim().length > 0);
      if(lines.length < 2) return [];
      const headers = splitCSVLine(lines[0]).map(h => h.trim());
      const out = [];
      for(let i=1;i<lines.length;i++){
        const cols = splitCSVLine(lines[i]);
        const row = {};
        headers.forEach((h, idx) => row[h] = (cols[idx] ?? ""));
        out.push(row);
      }
      return out;
    }

    function splitCSVLine(line){
      const result = [];
      let cur = "";
      let inQuotes = false;
      for(let i=0;i<line.length;i++){
        const ch = line[i];
        if(ch === '"' ){
          if(inQuotes && line[i+1] === '"'){ cur += '"'; i++; }
          else inQuotes = !inQuotes;
        } else if(ch === "," && !inQuotes){
          result.push(cur);
          cur = "";
        } else {
          cur += ch;
        }
      }
      result.push(cur);
      return result;
    }

    // ---------------------------
    // Mailto builder (robust encoding)
    // ---------------------------
    function buildOrderEmail({buyerName, buyerPhone, buyerComments}){
      const lines = [];
      const now = new Date();
      const dt = now.toLocaleString(state.lang === "fr" ? "fr-CA" : "en-CA");

      const subject = state.lang === "fr"
        ? `Commande Wolf (${dt})`
        : `Wolf Order (${dt})`;

      lines.push(state.lang === "fr" ? "Bonjour," : "Hello,");
      lines.push("");
      lines.push(state.lang === "fr" ? "Voici une demande de commande:" : "Here is an order request:");
      lines.push("");
      lines.push(`Name: ${buyerName}`);
      lines.push(`Phone: ${buyerPhone}`);
      if(buyerComments && buyerComments.trim()) lines.push(`Comments: ${buyerComments.trim()}`);
      lines.push("");
      lines.push("Order:");
      lines.push("----------------------------------------");

      state.cart.forEach(it => {
        const itemName = state.lang === "fr" ? it.itemName_fr : it.itemName_en;
        const type = findType(it.productType);
        const size = findSize(it.size);

        const unit = Number(it.unitPrice);
        const qty = Number(it.qty);
        const total = unit * qty;

        const typeLabel = state.lang === "fr" ? type.fr : type.en;
        const sizeLabel = state.lang === "fr" ? size.label_fr : size.label_en;

        lines.push(`${it.itemId} | ${itemName}`);
        lines.push(`  ${typeLabel} | ${sizeLabel} | Unit: ${money(unit)} | Qty: ${qty} | Line: ${money(total)}`);
      });

      lines.push("----------------------------------------");
      lines.push(`${s("subtotal")}: ${money(cartSubtotal())}`);
      lines.push(`${s("total")}: ${money(cartSubtotal())}`);
      lines.push("");

      lines.push(state.lang === "fr" ? "Remise:" : "Pickup:");
      lines.push(state.lang === "fr" ? CONFIG.pickup_fr : CONFIG.pickup_en);
      lines.push("");

      // Always include disclaimer in both languages
      lines.push("Disclaimer (EN): " + CONFIG.disclaimer_en);
      lines.push("Avis (FR): " + CONFIG.disclaimer_fr);

      const body = lines.join("\n");

      // Mailto requires URL encoding. Keep it simple and robust:
      const mailto = `mailto:${encodeURIComponent(CONFIG.orderEmailTo)}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
      return mailto;
    }

    // ---------------------------
    // Rendering
    // ---------------------------
    const app = document.getElementById("app");

    function render(){
      state.route = parseHash();

      if(state.route.view === "item"){
        const item = catalogById[state.route.id];
        if(!item) return renderHome(); // fallback
        return renderItem(item);
      }
      if(state.route.view === "cart"){
        return renderCart();
      }
      return renderHome();
    }

    function renderHome(){
      const grid = catalog.map(item => {
        const title = state.lang === "fr" ? item.title_fr : item.title_en;
        const tags = (item.tags || "").split("|").map(x => x.trim()).filter(Boolean);
        const tagHTML = tags.slice(0,3).map(x => `<span class="tag">${escapeHTML(x)}</span>`).join("");
        return `
          <button class="card" type="button" onclick="go('#item/${encodeURIComponent(item.id)}')" aria-label="${escapeAttr(s("a11yItem"))}: ${escapeAttr(title)}">
            <div class="thumb">
              <img src="assets/images/${escapeAttr(item.image_filename)}" alt="${escapeAttr(title)}">
            </div>
            <div class="cardBody">
              <div class="cardTitle">${escapeHTML(title)}</div>
              <div class="cardMeta">
                <span class="muted">${escapeHTML(item.id)}</span>
                ${tagHTML}
              </div>
            </div>
          </button>
        `;
      }).join("");

      app.innerHTML = `
        <section class="hero">
          <div class="heroCard">
            <div class="emoji" aria-hidden="true">🐺</div>
            <div>
              <h1>${escapeHTML(s("introTitle"))}</h1>
              <p>${escapeHTML(s("introText"))}</p>
            </div>
          </div>
        </section>

        <section aria-label="${escapeAttr(s("a11yGrid"))}">
          <div class="grid">
            ${grid}
          </div>
        </section>
      `;
    }

    function renderItem(item){
      const title = state.lang === "fr" ? item.title_fr : item.title_en;
      const desc = state.lang === "fr" ? item.description_fr : item.description_en;

      const typeOptions = CONFIG.productTypes.map(pt => {
        const label = state.lang === "fr" ? pt.fr : pt.en;
        return `<option value="${escapeAttr(pt.key)}">${escapeHTML(label)}</option>`;
      }).join("");

      const sizeOptions = CONFIG.sizes.map(sz => {
      const label = state.lang === "fr" ? sz.label_fr : sz.label_en;
      return `<option value="${escapeAttr(sz.key)}">${escapeHTML(label)}</option>`;
      }).join("");

      app.innerHTML = `
        <section class="view">
          <div class="panel">
            <div class="panelHeader">
              <div class="crumbs">
                <button class="btn" type="button" onclick="go('#')" aria-label="${escapeAttr(s("back"))}">${escapeHTML(s("back"))}</button>
                <div>
                  <div class="small">${escapeHTML(item.id)}. ${escapeHTML(s("itemDetails"))}</div>
                </div>
              </div>
              <button class="btn btnPrimary" type="button" onclick="go('#cart')">${escapeHTML(s("cart"))} (${cartCount()})</button>
            </div>

            <div class="panelBody">
              <div class="bigImg">
                <img src="assets/images/${escapeAttr(item.image_filename)}" alt="${escapeAttr(title)}">
              </div>

              <div class="info">
                <h2>${escapeHTML(title)}</h2>
                ${desc ? `<p>${escapeHTML(desc)}</p>` : `<p class="muted">${escapeHTML(s("tagLabel"))}: ${(item.tags || " ").split("|").map(x=>x.trim()).filter(Boolean).join(", ") || "-"}</p>`}

                <div class="form" aria-label="Order options">
                  <div>
                    <label for="typeSel">${escapeHTML(s("productType"))}</label>
                    <select id="typeSel">${typeOptions}</select>
                  </div>

                  <div>
                    <label for="sizeSel">${escapeHTML(s("size"))}</label>
                    <select id="sizeSel">${sizeOptions}</select>
                  </div>

                  <div class="row2">
                    <div>
                      <label for="qtyInp">${escapeHTML(s("qty"))}</label>
                      <input id="qtyInp" inputmode="numeric" pattern="[0-9]*" type="number" min="1" max="99" value="1">
                    </div>
                    <div class="priceLine" aria-label="Price preview">
                      <span>${escapeHTML(s("unit"))}</span>
                      <strong id="unitPrice">${money(CONFIG.sizes[0].price)}</strong>
                    </div>
                  </div>

                  <button class="btn btnPrimary" type="button" id="addBtn">${escapeHTML(s("addToCart"))}</button>

                  <div class="notice">
                    ${escapeHTML(state.lang === "fr" ? CONFIG.pickup_fr : CONFIG.pickup_en)}
                    <div class="divider"></div>
                    <div><strong>EN:</strong> ${escapeHTML(CONFIG.disclaimer_en)}</div>
                    <div style="margin-top:6px;"><strong>FR:</strong> ${escapeHTML(CONFIG.disclaimer_fr)}</div>
                  </div>
                </div>

                <span class="srOnly" id="a11yMsg"></span>
              </div>
            </div>
          </div>
        </section>
      `;

      const typeSel = document.getElementById("typeSel");
      const sizeSel = document.getElementById("sizeSel");
      const qtyInp = document.getElementById("qtyInp");
      const unitPrice = document.getElementById("unitPrice");
      const addBtn = document.getElementById("addBtn");
      const a11yMsg = document.getElementById("a11yMsg");

      function syncUnit(){
      const price = getUnitPrice(typeSel.value, sizeSel.value);
      unitPrice.textContent = money(price);
      }
      typeSel.addEventListener("change", syncUnit);
      sizeSel.addEventListener("change", syncUnit);
      syncUnit();

      addBtn.addEventListener("click", () => {
        addToCart(item, typeSel.value, sizeSel.value, qtyInp.value);
        a11yMsg.textContent = state.lang === "fr" ? "Ajouté au panier." : "Added to cart.";
        syncTopBar();
      });
    }

    function renderCart(){
      const itemsHtml = state.cart.map(it => {
        const name = state.lang === "fr" ? it.itemName_fr : it.itemName_en;
        const type = findType(it.productType);
        const size = findSize(it.size);

        const typeLabel = state.lang === "fr" ? type.fr : type.en;
        const sizeLabel = state.lang === "fr" ? size.label_fr : size.label_en;

        const unit = Number(it.unitPrice);
        const qty = Number(it.qty);
        const total = unit * qty;

        return `
          <div class="cartItem">
            <div>
              <div class="name">${escapeHTML(it.itemId)}. ${escapeHTML(name)}</div>
              <div class="sub">${escapeHTML(typeLabel)}. ${escapeHTML(sizeLabel)}</div>
            </div>

            <div class="right">
              <div class="muted">${escapeHTML(s("unit"))}</div>
              <div><strong>${escapeHTML(money(unit))}</strong></div>
            </div>

            <div>
              <label class="srOnly" for="qty_${escapeAttr(it.lineId)}">${escapeHTML(s("qty"))}</label>
              <input id="qty_${escapeAttr(it.lineId)}" type="number" min="1" max="99" value="${escapeAttr(String(qty))}"
                     onchange="updateQty('${escapeJS(it.lineId)}', this.value)">
            </div>

            <div class="right">
              <div class="muted">${escapeHTML(s("total"))}</div>
              <div><strong>${escapeHTML(money(total))}</strong></div>
            </div>

            <div class="right">
              <button class="btn btnDanger" type="button" onclick="removeLine('${escapeJS(it.lineId)}')">${escapeHTML(s("remove"))}</button>
            </div>
          </div>
        `;
      }).join("");

      const subtotal = cartSubtotal();

      app.innerHTML = `
        <section class="view">
          <div class="panel">
            <div class="panelHeader">
              <div class="crumbs">
                <button class="btn" type="button" onclick="go('#')" aria-label="${escapeAttr(s("back"))}">${escapeHTML(s("back"))}</button>
                <div>
                  <div class="small">${escapeHTML(s("cart"))}</div>
                </div>
              </div>
            </div>

            <div class="panelBody" style="grid-template-columns: 1fr;">
              ${state.cart.length === 0 ? `
                <div class="notice">${escapeHTML(s("empty"))}</div>
              ` : `
                <div class="cartList">${itemsHtml}</div>

                <div class="priceLine">
                  <span>${escapeHTML(s("subtotal"))}</span>
                  <strong>${escapeHTML(money(subtotal))}</strong>
                </div>

                <div class="divider"></div>

                <h2 style="margin:0;font-size:18px;">${escapeHTML(s("checkout"))}</h2>

                <div class="row2">
                  <div>
                    <label for="buyerName">${escapeHTML(s("name"))} (${escapeHTML(s("required"))})</label>
                    <input id="buyerName" autocomplete="name" placeholder="${state.lang==='fr' ? 'Ex: Alex' : 'Ex: Alex'}">
                  </div>
                  <div>
                    <label for="buyerPhone">${escapeHTML(s("phone"))} (${escapeHTML(s("required"))})</label>
                    <input id="buyerPhone" inputmode="tel" autocomplete="tel" placeholder="${state.lang==='fr' ? 'Ex: 514-555-1234' : 'Ex: 514-555-1234'}">
                  </div>
                </div>

                <div>
                  <label for="buyerComments">${escapeHTML(s("comments"))}</label>
                  <textarea id="buyerComments" placeholder="${state.lang==='fr' ? 'Optionnel' : 'Optional'}"></textarea>
                </div>

                <button class="btn btnPrimary" type="button" id="emailBtn">${escapeHTML(s("sendEmail"))}</button>
                <div class="notice">${escapeHTML(s("noteMailto"))}</div>

                <div class="notice">
                  <div><strong>EN:</strong> ${escapeHTML(CONFIG.disclaimer_en)}</div>
                  <div style="margin-top:6px;"><strong>FR:</strong> ${escapeHTML(CONFIG.disclaimer_fr)}</div>
                </div>
              `}
            </div>
          </div>
        </section>
      `;

      if(state.cart.length > 0){
        const emailBtn = document.getElementById("emailBtn");
        emailBtn.addEventListener("click", () => {
          const buyerName = (document.getElementById("buyerName").value || "").trim();
          const buyerPhone = (document.getElementById("buyerPhone").value || "").trim();
          const buyerComments = (document.getElementById("buyerComments").value || "").trim();

          if(!buyerName || !buyerPhone){
            alert(state.lang === "fr"
              ? "Merci d’entrer ton nom et ton téléphone."
              : "Please enter your name and phone number."
            );
            return;
          }

          const mailto = buildOrderEmail({ buyerName, buyerPhone, buyerComments });

          // Some browsers block immediate navigation if not triggered by click.
          // This is inside click, so ok.
          window.location.href = mailto;
        });
      }
    }

    // Escaping helpers
    function escapeHTML(str){
      return String(str ?? "")
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll('"',"&quot;")
        .replaceAll("'","&#039;");
    }
    function escapeAttr(str){ return escapeHTML(str).replaceAll("`","&#096;"); }
    function escapeJS(str){ return String(str ?? "").replaceAll("\\","\\\\").replaceAll("'","\\'"); }

    // Top bar events
    document.getElementById("langBtn").addEventListener("click", () => {
      setLang(state.lang === "fr" ? "en" : "fr");
    });

    document.getElementById("cartBtn").addEventListener("click", () => go("#cart"));

    window.addEventListener("hashchange", render);

    // Init
    (async function init(){
      syncTopBar();
      try{
        await loadConfig();
        await loadCatalog();
      }catch(e){
        app.innerHTML = `<div class="notice">${escapeHTML(s("catalogError"))}</div>`;
        return;
      }
      render();
    })();
  </script>
</body>
</html>
